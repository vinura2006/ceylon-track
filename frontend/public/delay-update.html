<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Train Delay - Ceylon Track Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2D6A4F;
            --primary-dark: #1B4332;
            --primary-light: #40916C;
            --orange: #E67E22;
            --orange-light: #F39C12;
            --red: #C0392B;
            --red-light: #E74C3C;
            --blue: #2980B9;
            --blue-light: #3498DB;
            --grey: #7F8C8D;
            --grey-light: #95A5A6;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-dark: #1e293b;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .navbar-email {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .btn-bulk {
            background: var(--orange);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-bulk:hover {
            background: var(--orange-light);
        }

        /* Table */
        .table-container {
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-medium);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg-light);
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-medium);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9375rem;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #f0f7ff;
        }

        /* Status Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .badge-ontime {
            background: #dcfce7;
            color: #166534;
        }

        .badge-delayed {
            background: #ffedd5;
            color: #9a3412;
        }

        .badge-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-scheduled {
            background: #f1f5f9;
            color: #475569;
        }

        /* Buttons */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-update {
            background: var(--blue);
            color: white;
        }

        .btn-update:hover {
            background: var(--blue-light);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            padding: 0.625rem 1.25rem;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
        }

        .btn-cancel {
            background: var(--grey);
            color: white;
            padding: 0.625rem 1.25rem;
        }

        .btn-cancel:hover {
            background: var(--grey-light);
        }

        /* Inline Edit Form */
        .edit-form {
            background: #f8fafc;
            border: 2px solid var(--primary-light);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1rem 0;
        }

        .edit-form-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-medium);
        }

        .form-group select,
        .form-group input {
            padding: 0.625rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9375rem;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .modal-body {
            padding: 1.5rem;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 1rem 1.25rem;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-lg);
            max-width: 400px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-success {
            background: var(--primary);
        }

        .toast-error {
            background: var(--red);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-medium);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-medium);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            th, td {
                padding: 0.75rem;
                font-size: 0.875rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <span>🚆</span>
            <span>Ceylon Track Admin</span>
        </div>
        <div class="navbar-user">
            <span class="navbar-email" id="userEmail"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <a href="/admin.html" class="back-link">← Back to Dashboard</a>

        <div class="page-header">
            <h1 class="page-title">Update Train Delay</h1>
            <button class="btn-bulk" onclick="openBulkModal()">
                <span>📦</span>
                <span>Bulk Route Delay</span>
            </button>
        </div>

        <div class="table-container">
            <div class="table-header">Today's Train Trips</div>
            <div class="table-wrapper">
                <table id="tripsTable">
                    <thead>
                        <tr>
                            <th>Train Name</th>
                            <th>Train No</th>
                            <th>Route</th>
                            <th>Departure</th>
                            <th>Arrival</th>
                            <th>Status</th>
                            <th>Delay</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tripsTableBody">
                        <tr>
                            <td colspan="8" class="loading">Loading trips...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div id="inlineEditForm" style="display: none;"></div>
        </div>
    </div>

    <!-- Bulk Update Modal -->
    <div class="modal-overlay" id="bulkModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Bulk Route Delay Update</h2>
                <button class="modal-close" onclick="closeBulkModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="bulkRoute">Select Route</label>
                    <select id="bulkRoute">
                        <option value="">Loading routes...</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="bulkDelay">Delay Minutes</label>
                    <input type="number" id="bulkDelay" min="0" value="15">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="bulkStatus">Status</label>
                    <select id="bulkStatus">
                        <option value="Delayed">Delayed</option>
                        <option value="On Time">On Time</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <button class="btn-submit" onclick="applyBulkDelay()" style="width: 100%;">
                    Apply to All Trains on This Route
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        let currentTrips = [];
        let editingTripId = null;

        // Check authentication on load
        function checkAuth() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (!token || !userStr) {
                window.location.href = '/admin.html';
                return false;
            }
            
            const user = JSON.parse(userStr);
            if (user.role !== 'Admin' && user.role !== 'Staff') {
                window.location.href = '/admin.html';
                return false;
            }
            
            document.getElementById('userEmail').textContent = user.email;
            return true;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/admin.html';
        }

        // Toast notifications
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = type === 'success' ? `✅ ${message}` : `❌ ${message}`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Fetch today's trips
        async function fetchTrips() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/admin/trips/today`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '/admin.html';
                        return;
                    }
                    throw new Error('Failed to fetch trips');
                }
                
                const data = await response.json();
                currentTrips = data.trips || [];
                renderTrips();
            } catch (error) {
                console.error('Error fetching trips:', error);
                document.getElementById('tripsTableBody').innerHTML = `
                    <tr>
                        <td colspan="8" class="empty-state">
                            Error loading trips. Please try again.
                        </td>
                    </tr>
                `;
                showToast('Failed to load trips', 'error');
            }
        }

        // Get status badge HTML
        function getStatusBadge(status, delayMinutes) {
            const statusLower = (status || '').toLowerCase();
            
            if (statusLower === 'cancelled') {
                return '<span class="badge badge-cancelled">❌ Cancelled</span>';
            }
            if (statusLower === 'delayed' || delayMinutes > 0) {
                return `<span class="badge badge-delayed">⚠️ Delayed +${delayMinutes} min</span>`;
            }
            if (statusLower === 'on_time' || statusLower === 'ontime' || statusLower === 'on time') {
                return '<span class="badge badge-ontime">✅ On Time</span>';
            }
            return '<span class="badge badge-scheduled">🕐 Scheduled</span>';
        }

        // Render trips table
        function renderTrips() {
            const tbody = document.getElementById('tripsTableBody');
            
            if (currentTrips.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="empty-state">
                            No trips scheduled for today.
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = currentTrips.map(trip => `
                <tr data-trip-id="${trip.schedule_id}">
                    <td><strong>${trip.train.name}</strong></td>
                    <td>${trip.train.number}</td>
                    <td>${trip.route.name}</td>
                    <td>${trip.departure_time}</td>
                    <td>${trip.arrival_time}</td>
                    <td>${getStatusBadge(trip.status, trip.delay_minutes)}</td>
                    <td>${trip.delay_minutes > 0 ? `+${trip.delay_minutes} min` : '-'}</td>
                    <td>
                        <button class="btn btn-update" onclick="showEditForm(${trip.schedule_id})">
                            Update
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Show inline edit form
        function showEditForm(tripId) {
            editingTripId = tripId;
            const trip = currentTrips.find(t => t.schedule_id === tripId);
            if (!trip) return;
            
            const formContainer = document.getElementById('inlineEditForm');
            const currentStatus = (trip.status || '').toLowerCase();
            
            formContainer.innerHTML = `
                <div class="edit-form">
                    <div class="edit-form-title">
                        Updating: ${trip.train.name} — ${trip.route.name}
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="editStatus">Status</label>
                            <select id="editStatus">
                                <option value="On Time" ${currentStatus === 'on_time' || currentStatus === 'ontime' ? 'selected' : ''}>On Time</option>
                                <option value="Delayed" ${currentStatus === 'delayed' ? 'selected' : ''}>Delayed</option>
                                <option value="Cancelled" ${currentStatus === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="editDelay">Delay Minutes</label>
                            <input type="number" id="editDelay" min="0" value="${trip.delay_minutes || 0}">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-submit" onclick="submitUpdate()">Update Status</button>
                        <button class="btn-cancel" onclick="hideEditForm()">Cancel</button>
                    </div>
                </div>
            `;
            
            formContainer.style.display = 'block';
            
            // Disable delay input when status is On Time or Cancelled
            const statusSelect = document.getElementById('editStatus');
            const delayInput = document.getElementById('editDelay');
            
            statusSelect.addEventListener('change', function() {
                const status = this.value.toLowerCase();
                if (status === 'on time' || status === 'cancelled') {
                    delayInput.disabled = true;
                    delayInput.value = 0;
                } else {
                    delayInput.disabled = false;
                }
            });
            
            // Initial check
            if (currentStatus === 'on_time' || currentStatus === 'ontime' || currentStatus === 'cancelled') {
                delayInput.disabled = true;
            }
            
            // Scroll to form
            formContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Hide edit form
        function hideEditForm() {
            document.getElementById('inlineEditForm').style.display = 'none';
            editingTripId = null;
        }

        // Submit update
        async function submitUpdate() {
            if (!editingTripId) return;
            
            const token = localStorage.getItem('token');
            const status = document.getElementById('editStatus').value;
            const delayMinutes = parseInt(document.getElementById('editDelay').value) || 0;
            
            if (delayMinutes < 0) {
                showToast('Delay minutes cannot be negative', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/admin/trips/${editingTripId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        status: status,
                        delay_minutes: delayMinutes
                    })
                });
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '/admin.html';
                        return;
                    }
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to update status');
                }
                
                // Update local data
                const tripIndex = currentTrips.findIndex(t => t.schedule_id === editingTripId);
                if (tripIndex !== -1) {
                    currentTrips[tripIndex].status = status;
                    currentTrips[tripIndex].delay_minutes = delayMinutes;
                    renderTrips();
                }
                
                hideEditForm();
                showToast('Delay updated successfully');
                
            } catch (error) {
                console.error('Error updating status:', error);
                showToast(error.message || 'Update failed. Please try again.', 'error');
            }
        }

        // Fetch routes for bulk modal
        async function fetchRoutes() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/admin/routes`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) return;
                
                const data = await response.json();
                const select = document.getElementById('bulkRoute');
                select.innerHTML = '<option value="">Select a route...</option>' +
                    data.routes.map(r => `<option value="${r.id}">${r.name} (${r.type})</option>`).join('');
            } catch (error) {
                console.error('Error fetching routes:', error);
            }
        }

        // Open bulk modal
        function openBulkModal() {
            fetchRoutes();
            document.getElementById('bulkModal').classList.add('active');
        }

        // Close bulk modal
        function closeBulkModal() {
            document.getElementById('bulkModal').classList.remove('active');
        }

        // Apply bulk delay
        async function applyBulkDelay() {
            const token = localStorage.getItem('token');
            const routeId = document.getElementById('bulkRoute').value;
            const delayMinutes = parseInt(document.getElementById('bulkDelay').value) || 0;
            const status = document.getElementById('bulkStatus').value;
            
            if (!routeId) {
                showToast('Please select a route', 'error');
                return;
            }
            
            if (delayMinutes < 0) {
                showToast('Delay minutes cannot be negative', 'error');
                return;
            }
            
            // Find all trips on this route
            const tripsToUpdate = currentTrips.filter(t => t.route_id === parseInt(routeId));
            
            if (tripsToUpdate.length === 0) {
                showToast('No active trips found for this route today', 'error');
                return;
            }
            
            let successCount = 0;
            let failCount = 0;
            
            for (const trip of tripsToUpdate) {
                try {
                    const response = await fetch(`${API_BASE_URL}/admin/trips/${trip.schedule_id}/status`, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            status: status,
                            delay_minutes: delayMinutes
                        })
                    });
                    
                    if (response.ok) {
                        successCount++;
                        // Update local data
                        const tripIndex = currentTrips.findIndex(t => t.schedule_id === trip.schedule_id);
                        if (tripIndex !== -1) {
                            currentTrips[tripIndex].status = status;
                            currentTrips[tripIndex].delay_minutes = delayMinutes;
                        }
                    } else {
                        failCount++;
                    }
                } catch (error) {
                    failCount++;
                }
            }
            
            renderTrips();
            closeBulkModal();
            
            if (failCount === 0) {
                showToast(`Successfully updated ${successCount} trips`);
            } else {
                showToast(`Updated ${successCount} trips, ${failCount} failed`, 'error');
            }
        }

        // Close modal when clicking outside
        document.getElementById('bulkModal').addEventListener('click', (e) => {
            if (e.target.id === 'bulkModal') closeBulkModal();
        });

        // Initialize
        if (checkAuth()) {
            fetchTrips();
        }
    </script>
</body>
</html>
