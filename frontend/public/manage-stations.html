<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Stations - Ceylon Track Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2D6A4F;
            --primary-dark: #1B4332;
            --primary-light: #40916C;
            --orange: #E67E22;
            --orange-light: #F39C12;
            --red: #C0392B;
            --red-light: #E74C3C;
            --blue: #2980B9;
            --blue-light: #3498DB;
            --grey: #7F8C8D;
            --grey-light: #95A5A6;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-dark: #1e293b;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .navbar-email {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: var(--primary-dark);
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            color: var(--text-medium);
            font-size: 0.875rem;
        }

        .stat-item strong {
            color: var(--text-dark);
        }

        /* Search Bar */
        .search-bar {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            width: 100%;
            max-width: 400px;
            margin-bottom: 1.5rem;
            font-size: 0.9375rem;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Table */
        .table-container {
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg-light);
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-medium);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9375rem;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #f0f7ff;
        }

        /* Status Dot */
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.active {
            background: var(--primary);
        }

        .status-dot.inactive {
            background: var(--grey);
        }

        /* Buttons */
        .btn {
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.8125rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-edit {
            background: var(--blue);
            color: white;
            margin-right: 0.5rem;
        }

        .btn-edit:hover {
            background: var(--blue-light);
        }

        .btn-toggle {
            background: var(--orange);
            color: white;
        }

        .btn-toggle:hover {
            background: var(--orange-light);
        }

        .btn-toggle.active {
            background: var(--primary);
        }

        .btn-toggle.active:hover {
            background: var(--primary-light);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-medium);
            margin-bottom: 0.375rem;
        }

        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9375rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group input[type="checkbox"] {
            width: auto;
            margin-right: 0.5rem;
        }

        .form-group.checkbox {
            display: flex;
            align-items: center;
        }

        .form-group.checkbox label {
            margin-bottom: 0;
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
        }

        .btn-cancel {
            background: var(--grey);
            color: white;
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-cancel:hover {
            background: var(--grey-light);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 1rem 1.25rem;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast-success {
            background: var(--primary);
        }

        .toast-error {
            background: var(--red);
        }

        /* Loading/Empty */
        .loading, .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-medium);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            th, td {
                padding: 0.75rem;
                font-size: 0.875rem;
            }

            .btn {
                padding: 0.375rem 0.5rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <span>🚆</span>
            <span>Ceylon Track Admin</span>
        </div>
        <div class="navbar-user">
            <span class="navbar-email" id="userEmail"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <a href="/admin.html" class="back-link">← Back to Dashboard</a>

        <div class="page-header">
            <h1 class="page-title">Manage Stations</h1>
            <button class="btn-add" onclick="openAddModal()">
                <span>+</span>
                <span>Add New Station</span>
            </button>
        </div>

        <div class="stats-row" id="statsRow">
            <span class="stat-item">Loading...</span>
        </div>

        <input type="text" class="search-bar" id="searchBar" placeholder="Search stations..." oninput="filterStations()">

        <div class="table-container">
            <div class="table-wrapper">
                <table id="stationsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Status</th>
                            <th>Station Name</th>
                            <th>Code</th>
                            <th>Latitude</th>
                            <th>Longitude</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="stationsTableBody">
                        <tr>
                            <td colspan="7" class="loading">Loading stations...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="stationModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Station</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="stationForm" onsubmit="event.preventDefault(); saveStation();">
                    <input type="hidden" id="stationId">
                    <div class="form-group">
                        <label for="stationName">Station Name *</label>
                        <input type="text" id="stationName" required>
                    </div>
                    <div class="form-group">
                        <label for="stationCode">Code * (max 5 chars, uppercase)</label>
                        <input type="text" id="stationCode" required maxlength="5" style="text-transform: uppercase;">
                    </div>
                    <div class="form-group">
                        <label for="stationLat">Latitude</label>
                        <input type="number" id="stationLat" step="0.000001" placeholder="6.9271">
                    </div>
                    <div class="form-group">
                        <label for="stationLng">Longitude</label>
                        <input type="number" id="stationLng" step="0.000001" placeholder="79.8612">
                    </div>
                    <div class="form-group checkbox">
                        <input type="checkbox" id="stationActive" checked>
                        <label for="stationActive">Active (Major Station)</label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Save Station</button>
                        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        let allStations = [];
        let filteredStations = [];
        let editingStationId = null;

        // Auth check
        function checkAuth() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (!token || !userStr) {
                window.location.href = '/admin.html';
                return false;
            }
            
            const user = JSON.parse(userStr);
            if (user.role !== 'Admin' && user.role !== 'Staff') {
                window.location.href = '/admin.html';
                return false;
            }
            
            document.getElementById('userEmail').textContent = user.email;
            return true;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/admin.html';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = type === 'success' ? `✅ ${message}` : `❌ ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Fetch stations
        async function fetchStations() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/admin/stations`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '/admin.html';
                        return;
                    }
                    throw new Error('Failed to fetch stations');
                }
                
                const data = await response.json();
                allStations = data.stations || [];
                filteredStations = [...allStations];
                updateStats();
                renderStations();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('stationsTableBody').innerHTML = `
                    <tr><td colspan="7" class="empty-state">Error loading stations</td></tr>
                `;
                showToast('Failed to load stations', 'error');
            }
        }

        // Update stats
        function updateStats() {
            const active = allStations.filter(s => s.is_major).length;
            const inactive = allStations.filter(s => !s.is_major).length;
            document.getElementById('statsRow').innerHTML = `
                <span class="stat-item">Total: <strong>${allStations.length}</strong> stations</span>
                <span class="stat-item">Active: <strong>${active}</strong></span>
                <span class="stat-item">Inactive: <strong>${inactive}</strong></span>
            `;
        }

        // Filter stations
        function filterStations() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            filteredStations = allStations.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.code.toLowerCase().includes(query)
            );
            renderStations();
        }

        // Render stations table
        function renderStations() {
            const tbody = document.getElementById('stationsTableBody');
            
            if (filteredStations.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No stations found</td></tr>`;
                return;
            }
            
            tbody.innerHTML = filteredStations.map((s, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><span class="status-dot ${s.is_major ? 'active' : 'inactive'}"></span></td>
                    <td><strong>${s.name}</strong></td>
                    <td>${s.code}</td>
                    <td>${s.latitude || '-'}</td>
                    <td>${s.longitude || '-'}</td>
                    <td>
                        <button class="btn btn-edit" onclick="openEditModal(${s.id})">Edit</button>
                        <button class="btn btn-toggle ${s.is_major ? '' : 'active'}" onclick="toggleStation(${s.id})">
                            ${s.is_major ? 'Deactivate' : 'Activate'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Modal functions
        function openAddModal() {
            editingStationId = null;
            document.getElementById('modalTitle').textContent = 'Add New Station';
            document.getElementById('stationForm').reset();
            document.getElementById('stationId').value = '';
            document.getElementById('stationModal').classList.add('active');
        }

        function openEditModal(id) {
            const station = allStations.find(s => s.id === id);
            if (!station) return;
            
            editingStationId = id;
            document.getElementById('modalTitle').textContent = 'Edit Station';
            document.getElementById('stationId').value = station.id;
            document.getElementById('stationName').value = station.name;
            document.getElementById('stationCode').value = station.code;
            document.getElementById('stationLat').value = station.latitude || '';
            document.getElementById('stationLng').value = station.longitude || '';
            document.getElementById('stationActive').checked = station.is_major;
            document.getElementById('stationModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('stationModal').classList.remove('active');
        }

        // Save station (create or update)
        async function saveStation() {
            const token = localStorage.getItem('token');
            const name = document.getElementById('stationName').value.trim();
            const code = document.getElementById('stationCode').value.trim().toUpperCase();
            const lat = parseFloat(document.getElementById('stationLat').value) || null;
            const lng = parseFloat(document.getElementById('stationLng').value) || null;
            const isMajor = document.getElementById('stationActive').checked;
            
            if (!name || !code) {
                showToast('Name and code are required', 'error');
                return;
            }
            
            const payload = {
                name, code, latitude: lat, longitude: lng, is_major: isMajor
            };
            
            try {
                let response;
                if (editingStationId) {
                    response = await fetch(`${API_BASE_URL}/admin/stations/${editingStationId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                } else {
                    response = await fetch(`${API_BASE_URL}/admin/stations`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                }
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '/admin.html';
                        return;
                    }
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to save station');
                }
                
                closeModal();
                showToast(editingStationId ? 'Station updated' : 'Station created');
                fetchStations();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Toggle station active status
        async function toggleStation(id) {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/admin/stations/${id}/toggle`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '/admin.html';
                        return;
                    }
                    throw new Error('Failed to toggle station');
                }
                
                const data = await response.json();
                const station = allStations.find(s => s.id === id);
                if (station) {
                    station.is_major = data.station.is_major;
                }
                renderStations();
                updateStats();
                showToast(`Station ${data.station.is_major ? 'activated' : 'deactivated'}`);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Close modal on outside click
        document.getElementById('stationModal').addEventListener('click', (e) => {
            if (e.target.id === 'stationModal') closeModal();
        });

        // Initialize
        if (checkAuth()) {
            fetchStations();
        }
    </script>
</body>
</html>
