<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live GPS Map - Ceylon Track</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-dark: #1e293b;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --ontime: #22c55e;
            --delayed: #f59e0b;
            --cancelled: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-white);
            box-shadow: var(--shadow);
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-medium);
            font-weight: 500;
            font-size: 0.875rem;
            transition: color 0.2s;
        }
        .nav-links a.active {
            color: var(--primary);
            font-weight: 700;
        }
        .nav-links a:hover {
            color: var(--primary);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }

        .panel {
            width: 350px;
            background: var(--bg-white);
            box-shadow: -4px 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        .panel-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .panel-subtitle {
            font-size: 0.875rem;
            color: var(--text-medium);
        }

        .train-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .train-item {
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .train-item:hover {
            border-color: var(--primary);
            background: #f8fafc;
        }

        .train-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .train-item-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .train-item-number {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.ontime { background: var(--ontime); }
        .status-dot.delayed { background: var(--delayed); }
        .status-dot.cancelled { background: var(--cancelled); }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            z-index: 1000;
            font-size: 0.875rem;
            pointer-events: none;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .legend-item:last-child { margin-bottom: 0; }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .panel {
                width: 100%;
                height: 40%;
            }
            #map {
                height: 60%;
            }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">🚂</div>
                <div class="logo-text">Ceylon Track</div>
            </a>
            <nav class="nav-links">
                <a href="index.html">Search</a>
                <a href="watch.html">Watch</a>
                <a href="map.html" class="active">Live Map</a>
            </nav>
        </div>
    </header>

    <div class="main-content">
        <div id="map"></div>
        <div class="legend">
            <div class="legend-item"><span class="status-dot ontime"></span> On Time</div>
            <div class="legend-item"><span class="status-dot delayed"></span> Delayed</div>
            <div class="legend-item"><span class="status-dot cancelled"></span> Cancelled</div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Active Trains</div>
                <div class="panel-subtitle" id="lastUpdated">Updating...</div>
            </div>
            <div class="train-list" id="trainList">
                <div style="text-align: center; color: #94a3b8; padding: 2rem;">Loading active trains...</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';
        
        // Initialize Map
        const map = L.map('map').setView([7.8731, 80.7718], 8);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Draw Railway Lines
        const mainLineCoords = [[6.9271, 79.8612], [7.0, 80.0], [7.2906, 80.6337]];
        const coastLineCoords = [[6.9271, 79.8612], [6.5, 80.0], [6.0535, 80.2210]];
        
        L.polyline(mainLineCoords, { color: '#6366f1', weight: 4, opacity: 0.7 }).addTo(map).bindPopup('Main Line');
        L.polyline(coastLineCoords, { color: '#ec4899', weight: 4, opacity: 0.7 }).addTo(map).bindPopup('Coast Line');

        const markers = {};
        let activeTrains = [];

        function getStatusColor(status) {
            if (status === 'Delayed') return '#f59e0b';
            if (status === 'Cancelled') return '#ef4444';
            return '#22c55e';
        }

        function createCustomMarker(color) {
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background-color:${color};width:16px;height:16px;border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.4);"></div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });
        }

        async function fetchLiveTrains() {
            try {
                const res = await fetch(`${API_URL}/gps/trains/live`);
                if (!res.ok) throw new Error('Failed to fetch');
                const trains = await res.json();
                
                updateMapAndList(trains);
                
                const now = new Date();
                document.getElementById('lastUpdated').textContent = `Last updated: ${now.toLocaleTimeString()}`;
            } catch (err) {
                console.error(err);
                document.getElementById('lastUpdated').textContent = `Error connecting to server`;
            }
        }

        function updateMapAndList(trains) {
            const trainList = document.getElementById('trainList');
            trainList.innerHTML = '';
            
            if (trains.length === 0) {
                trainList.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 2rem;">No active trains right now.</div>';
                
                // Clear existing markers
                Object.values(markers).forEach(m => map.removeLayer(m));
                return;
            }

            const currentIds = new Set(trains.map(t => t.train_id));

            // Remove old markers
            Object.keys(markers).forEach(id => {
                if (!currentIds.has(Number(id))) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            });

            trains.forEach(t => {
                const latlng = [t.current_lat, t.current_lng];
                const color = getStatusColor(t.status);
                const delayText = t.delay_minutes > 0 ? ` (+${t.delay_minutes} min)` : '';

                // Update or create marker
                if (markers[t.train_id]) {
                    markers[t.train_id].setLatLng(latlng);
                    markers[t.train_id].setIcon(createCustomMarker(color));
                } else {
                    markers[t.train_id] = L.marker(latlng, { icon: createCustomMarker(color) }).addTo(map);
                }

                // Update popup
                const popupContent = `
                    <div style="font-family:Inter,sans-serif;">
                        <strong style="font-size:1.1em;">${t.train_name}</strong><br>
                        <span style="color:#64748b;">${t.train_number}</span><br>
                        Status: <b>${t.status}</b>${delayText}<br>
                        Speed: ${t.speed_kmh} km/h<br>
                        <small style="color:#94a3b8;">${new Date(t.last_updated).toLocaleTimeString()}</small>
                    </div>
                `;
                markers[t.train_id].bindPopup(popupContent);

                // Add to list
                const statusClass = t.status === 'Delayed' ? 'delayed' : t.status === 'Cancelled' ? 'cancelled' : 'ontime';
                const item = document.createElement('div');
                item.className = 'train-item';
                item.onclick = () => {
                    map.setView(latlng, 12);
                    markers[t.train_id].openPopup();
                };
                
                item.innerHTML = `
                    <div class="train-item-header">
                        <div>
                            <div class="train-item-name">${t.train_name}</div>
                            <div class="train-item-number">${t.train_number}</div>
                        </div>
                        <span class="status-dot ${statusClass}"></span>
                    </div>
                    <div style="font-size: 0.875rem; color: #475569;">
                        ${t.status}${delayText}
                    </div>
                `;
                trainList.appendChild(item);
            });
        }

        // Start polling
        fetchLiveTrains();
        setInterval(fetchLiveTrains, 15000);

    </script>
</body>
</html>
