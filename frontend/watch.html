<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Watch - Ceylon Track</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .spinner-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .spinner-overlay.active { display: flex; }
        .spinner-overlay .spinner-global {
            width: 40px; height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin-global 0.8s linear infinite;
        }
        @keyframes spin-global { to { transform: rotate(360deg); } }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #3b82f6;
            --accent: #8b5cf6;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-dark: #1e293b;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --ontime: #22c55e;
            --ontime-bg: #dcfce7;
            --delayed: #f59e0b;
            --delayed-bg: #fef3c7;
            --cancelled: #ef4444;
            --cancelled-bg: #fee2e2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%);
            min-height: 100vh;
            color: var(--text-dark);
            padding-bottom: 80px;
        }

        .header {
            background: var(--bg-white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-medium);
            font-weight: 500;
            font-size: 0.875rem;
            transition: color 0.2s;
        }
        .nav-links a.active {
            color: var(--primary);
            font-weight: 700;
        }
        .nav-links a:hover {
            color: var(--primary);
        }

        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .summary-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1;
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            box-shadow: var(--shadow);
            min-width: 120px;
        }
        .stat-label {
            font-size: 0.875rem;
            color: var(--text-medium);
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-value.ontime { color: var(--ontime); }
        .stat-value.delayed { color: var(--delayed); }

        .watch-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .watch-card {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .train-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
        }
        .train-number {
            font-size: 0.875rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 0.875rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-badge.ontime { background: var(--ontime-bg); color: var(--ontime); }
        .status-badge.delayed { background: var(--delayed-bg); color: #92400e; }
        .status-badge.cancelled { background: var(--cancelled-bg); color: var(--cancelled); }

        .reliability-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-medium);
            background: var(--bg-light);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            margin-top: 0.5rem;
        }
        .reliability-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .reliability-dot.high { background: var(--ontime); }
        .reliability-dot.medium { background: var(--delayed); }
        .reliability-dot.low { background: var(--cancelled); }
        .reliability-dot.no-data { background: var(--text-light); }
        .reliability-percent { font-weight: 600; }

        .route-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            font-weight: 500;
        }
        .route-arrow { color: var(--text-light); }
        .dept-time { font-weight: 600; color: var(--primary); margin-left: auto; }

        .delay-info {
            font-size: 0.875rem;
            color: #92400e;
            background: var(--delayed-bg);
            padding: 0.5rem;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .toggles {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-medium);
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }

        .remove-btn {
            background: transparent;
            color: var(--cancelled);
            border: 1px solid var(--cancelled);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .remove-btn:hover { background: var(--cancelled-bg); }

        .empty-state {
            text-align: center;
            background: var(--bg-white);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: none;
        }
        .empty-state h2 { margin-bottom: 1rem; color: var(--text-dark); }
        .empty-state p { color: var(--text-medium); margin-bottom: 1.5rem; }
        .btn-primary {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        .status-bar {
            background: rgba(255, 255, 255, 0.9);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .offline-banner {
            background: #fef08a;
            color: #854d0e;
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        @media (max-width: 640px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <div class="spinner-overlay" id="spinner">
        <div class="spinner-global"></div>
    </div>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">🚂</div>
                <div class="logo-text">Ceylon Track</div>
            </a>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">Search</a>
                <a href="watch.html" class="active">Watch</a>
                <a href="map.html">Live Map</a>
                <!-- Admin link injected if applicable -->
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="offline-banner" id="offlineBanner">Showing last known data — you may be offline</div>
        
        <div class="status-bar">
            <span>Live Journey Watch</span>
            <span id="lastUpdated">Updating...</span>
        </div>

        <div class="summary-bar" id="summaryBar">
            <div class="stat-box">
                <div class="stat-label">Total Watching</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">On Time</div>
                <div class="stat-value ontime" id="statOntime">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Delayed</div>
                <div class="stat-value delayed" id="statDelayed">0</div>
            </div>
        </div>

        <div class="empty-state" id="emptyState">
            <h2>You are not watching any trains yet</h2>
            <p>Search for trains and click the bell icon to get live updates.</p>
            <a href="index.html" class="btn-primary">Search Trains</a>
        </div>

        <div class="watch-list" id="watchList">
            <!-- Cards injected here -->
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';

        function showSpinner() {
            document.getElementById('spinner').classList.add('active');
        }
        function hideSpinner() {
            document.getElementById('spinner').classList.remove('active');
        }
        function showError(message) {
            const existing = document.getElementById('error-banner');
            if (existing) existing.remove();
            const banner = document.createElement('div');
            banner.id = 'error-banner';
            banner.style.cssText = 'background:#fee2e2;color:#991b1b;padding:12px 20px;text-align:center;font-size:14px;';
            banner.textContent = message;
            document.body.insertBefore(banner, document.body.firstChild);
            setTimeout(() => banner.remove(), 5000);
        }

        // Ensure authentication
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html?redirect=watch';
        }

        // Setup nav based on role
        try {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user && (user.role === 'Staff' || user.role === 'Admin')) {
                const navLinks = document.getElementById('navLinks');
                const adminLink = document.createElement('a');
                adminLink.href = 'admin.html';
                adminLink.textContent = 'Admin';
                navLinks.appendChild(adminLink);
            }
        } catch(e) {}

        let lastUpdateTime = Date.now();
        let updateInterval;

        async function fetchWatches() {
            showSpinner();
            try {
                const response = await fetch(`${API_URL}/journeywatch`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const watches = await response.json();
                renderWatches(watches);
                
                document.getElementById('offlineBanner').style.display = 'none';
                lastUpdateTime = Date.now();
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('offlineBanner').style.display = 'block';
            } finally {
                hideSpinner();
            }
        }

        function renderWatches(watches) {
            const watchList = document.getElementById('watchList');
            const emptyState = document.getElementById('emptyState');
            const summaryBar = document.getElementById('summaryBar');
            
            if (watches.length === 0) {
                watchList.style.display = 'none';
                summaryBar.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            watchList.style.display = 'flex';
            summaryBar.style.display = 'flex';
            emptyState.style.display = 'none';

            let ontime = 0, delayed = 0;
            watchList.innerHTML = '';

            function getReliabilityInfo(reliabilityData) {
                const pct = (reliabilityData && reliabilityData.punctuality_percent != null)
                                       ? parseFloat(reliabilityData.punctuality_percent)
                                       : null;
                const totalTrips = (reliabilityData && reliabilityData.total_trips != null)
                                       ? parseInt(reliabilityData.total_trips)
                                       : 0;

                // No historical data at all
                if (totalTrips === 0 || pct === null) {
                    return { dotClass: 'no-data', label: 'NO HISTORY YET', percent: 0 };
                }

                // Has data but always late
                if (pct < 50 && totalTrips > 0) {
                    return { dotClass: 'low', label: 'OFTEN LATE', percent: pct };
                }

                // pct 50 to 80
                if (pct >= 50 && pct <= 80) {
                    return { dotClass: 'medium', label: 'SOMETIMES DELAYED', percent: pct };
                }

                // pct > 80
                if (pct > 80 && totalTrips > 0) {
                    return { dotClass: 'high', label: 'USUALLY ON TIME', percent: pct };
                }
                
                return { dotClass: 'no-data', label: 'NO HISTORY YET', percent: 0 };
            }

            watches.forEach(w => {
                if (w.current_status === 'Delayed') delayed++;
                else if (w.current_status === 'On Time') ontime++;

                const statusClass = w.current_status.toLowerCase().replace(' ', '');
                const delayText = w.delay_minutes > 0 ? `<div class="delay-info">Delayed by ${w.delay_minutes} mins</div>` : '';
                
                const rel = getReliabilityInfo(w.reliability);
                const reliabilityBadgeHtml = `
                    <div class="reliability-badge">
                        <span class="reliability-dot ${rel.dotClass}"></span>
                        <span class="reliability-percent">${rel.percent}%</span>
                        <span>${rel.label}</span>
                    </div>
                `;
                
                const card = document.createElement('div');
                card.className = 'watch-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="train-name">${w.train_name}</div>
                            <div class="train-number">${w.train_number} - ${w.watch_date.substring(0,10)}</div>
                            ${reliabilityBadgeHtml}
                        </div>
                        <div class="status-badge ${statusClass}">${w.current_status}</div>
                    </div>
                    <div class="route-info">
                        <span>${w.from_station_name}</span>
                        <span class="route-arrow">→</span>
                        <span>${w.to_station_name}</span>
                        <span class="dept-time">${w.departure_time.substring(0,5)}</span>
                    </div>
                    ${delayText}
                    <div class="actions">
                        <div class="toggles">
                            <label class="toggle-group">
                                <span>Delays</span>
                                <div class="switch">
                                    <input type="checkbox" onchange="updatePref(${w.id}, 'notify_delays', this.checked)" ${w.notify_delays ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </div>
                            </label>
                            <label class="toggle-group">
                                <span>Departure</span>
                                <div class="switch">
                                    <input type="checkbox" onchange="updatePref(${w.id}, 'notify_departure', this.checked)" ${w.notify_departure ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </div>
                            </label>
                            <label class="toggle-group">
                                <span>Cancel</span>
                                <div class="switch">
                                    <input type="checkbox" onchange="updatePref(${w.id}, 'notify_cancellations', this.checked)" ${w.notify_cancellations ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </div>
                            </label>
                        </div>
                        <button class="remove-btn" onclick="removeWatch(${w.id}, this)">Remove</button>
                    </div>
                `;
                watchList.appendChild(card);
            });

            document.getElementById('statTotal').textContent = watches.length;
            document.getElementById('statOntime').textContent = ontime;
            document.getElementById('statDelayed').textContent = delayed;
        }

        async function updatePref(id, field, value) {
            showSpinner();
            try {
                const body = {};
                body[field] = value;
                await fetch(`${API_URL}/journeywatch/${id}/notifications`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
            } catch (err) {
                console.error(err);
            } finally {
                hideSpinner();
            }
        }

        async function removeWatch(id, btn) {
            btn.disabled = true;
            showSpinner();
            try {
                const res = await fetch(`${API_URL}/journeywatch/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    fetchWatches();
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
            } finally {
                hideSpinner();
            }
        }

        function updateTimeAgo() {
            const seconds = Math.floor((Date.now() - lastUpdateTime) / 1000);
            document.getElementById('lastUpdated').textContent = `Last updated ${seconds} seconds ago`;
        }

        // Initial fetch
        fetchWatches();
        
        // Poll every 30s
        setInterval(fetchWatches, 30000);
        
        // Update time ago every second
        setInterval(updateTimeAgo, 1000);

    </script>
</body>
</html>
