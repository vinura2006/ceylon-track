<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ceylon Track</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a5f2a;
            --primary-dark: #12401c;
            --primary-light: #2d8a42;
            --accent: #f59e0b;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-dark: #1e293b;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* Header */
        .header {
            background: var(--bg-white);
            box-shadow: var(--shadow);
            padding: 1rem 1.5rem;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-email {
            color: var(--text-medium);
            font-size: 0.875rem;
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dark);
            cursor: pointer;
            font-size: 0.875rem;
        }

        .logout-btn:hover {
            background: var(--border);
        }

        /* Main Content */
        .main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .welcome {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .welcome h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .welcome p {
            opacity: 0.9;
        }

        /* Dashboard Cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .card h3 {
            font-size: 1rem;
            color: var(--text-medium);
            margin-bottom: 0.5rem;
        }

        .card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Actions */
        .actions {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .actions h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 0.75rem;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 0.9375rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .unauthorized {
            text-align: center;
            padding: 4rem 2rem;
        }

        .unauthorized h1 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .unauthorized p {
            color: var(--text-medium);
            margin-bottom: 1.5rem;
        }

        .unauthorized a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🚆</div>
                <span style="font-weight: 700; color: var(--primary);">Ceylon Track Admin</span>
            </div>
            <div class="user-info">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <main class="main" id="mainContent">
        <!-- Content loaded by JavaScript -->
    </main>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        // Check if user is logged in and has proper role
        function init() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');

            if (!token || !userStr) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userStr);
            
            // Only Admin and Staff allowed
            if (user.role !== 'Admin' && user.role !== 'Staff') {
                showUnauthorized();
                return;
            }

            // Show dashboard
            document.getElementById('userEmail').textContent = user.email;
            showDashboard(user);
        }

        function showDashboard(user) {
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="welcome">
                    <h1>Welcome, ${user.first_name || user.email}!</h1>
                    <p>You are logged in as ${user.role}</p>
                </div>

                <div class="dashboard-grid">
                    <div class="card">
                        <h3>Total Stations</h3>
                        <div class="value">32</div>
                    </div>
                    <div class="card">
                        <h3>Active Trains</h3>
                        <div class="value">12</div>
                    </div>
                    <div class="card">
                        <h3>Today's Trips</h3>
                        <div class="value">48</div>
                    </div>
                </div>

                <div class="actions">
                    <h2>Quick Actions</h2>
                    <button class="action-btn" onclick="alert('Update Delay feature coming in Sprint 2')">
                        ⏱️ Update Train Delay
                    </button>
                    <button class="action-btn" onclick="alert('Schedule management coming in Sprint 2')">
                        📅 Manage Schedules
                    </button>
                    <button class="action-btn" onclick="alert('Station management coming in Sprint 2')">
                        🚉 Manage Stations
                    </button>
                    <button class="action-btn" onclick="window.location.href='index.html'">
                        🔍 Go to Passenger Search
                    </button>
                </div>
            `;
        }

        function showUnauthorized() {
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="unauthorized">
                    <h1>🔒 Access Denied</h1>
                    <p>You don't have permission to access this page.</p>
                    <a href="index.html">Go to Home</a> | <a href="login.html">Login as Admin</a>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Start
        init();
    </script>
</body>
</html>
