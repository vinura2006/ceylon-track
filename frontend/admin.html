<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ceylon Track</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a5f2a;
            --primary-dark: #12401c;
            --primary-light: #2d8a42;
            --accent: #f59e0b;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-dark: #1e293b;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* Header */
        .header {
            background: var(--bg-white);
            box-shadow: var(--shadow);
            padding: 1rem 1.5rem;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-email {
            color: var(--text-medium);
            font-size: 0.875rem;
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dark);
            cursor: pointer;
            font-size: 0.875rem;
        }

        .logout-btn:hover {
            background: var(--border);
        }

        /* Main Content */
        .main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .welcome {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .welcome h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .welcome p {
            opacity: 0.9;
        }

        /* Dashboard Cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .card h3 {
            font-size: 1rem;
            color: var(--text-medium);
            margin-bottom: 0.5rem;
        }

        .card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Actions */
        .actions {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .actions h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 0.75rem;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 0.9375rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .unauthorized {
            text-align: center;
            padding: 4rem 2rem;
        }

        .unauthorized h1 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .unauthorized p {
            color: var(--text-medium);
            margin-bottom: 1.5rem;
        }

        .unauthorized a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-medium);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9375rem;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            display: none;
        }

        .form-message.success {
            display: block;
            background: #dcfce7;
            color: #166534;
        }

        .form-message.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🚆</div>
                <span style="font-weight: 700; color: var(--primary);">Ceylon Track Admin</span>
            </div>
            <div class="user-info">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <main class="main" id="mainContent">
        <!-- Content loaded by JavaScript -->
    </main>

    <!-- Update Delay Modal -->
    <div class="modal-overlay" id="delayModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Update Train Delay</div>
                <button class="modal-close" onclick="closeDelayModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="delayForm" onsubmit="submitDelayUpdate(event)">
                    <div class="form-group">
                        <label for="scheduleId">Schedule ID</label>
                        <input type="number" id="scheduleId" required min="1" placeholder="e.g. 1">
                    </div>
                    <div class="form-group">
                        <label for="delayMinutes">Delay (minutes)</label>
                        <input type="number" id="delayMinutes" required min="0" placeholder="e.g. 15">
                    </div>
                    <div class="form-group">
                        <label for="statusSelect">Status</label>
                        <select id="statusSelect">
                            <option value="Delayed">Delayed</option>
                            <option value="On Time">On Time</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" rows="2" placeholder="Optional notes..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">Update Status</button>
                    <div class="form-message" id="formMessage"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        // Check if user is logged in and has proper role
        function init() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');

            if (!token || !userStr) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userStr);
            
            // Only Admin and Staff allowed
            if (user.role !== 'Admin' && user.role !== 'Staff') {
                showUnauthorized();
                return;
            }

            // Show dashboard
            document.getElementById('userEmail').textContent = user.email;
            showDashboard(user);
        }

        async function fetchStats() {
            const token = localStorage.getItem('token');
            if (!token) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('statStations').textContent = data.total_stations || 0;
                    document.getElementById('statTrains').textContent = data.active_trains || 0;
                    document.getElementById('statTrips').textContent = data.todays_trips || 0;
                }
            } catch (error) {
                console.error('Failed to fetch stats:', error);
            }
        }

        function showDashboard(user) {
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="welcome">
                    <h1>Welcome, ${user.first_name || user.email}!</h1>
                    <p>You are logged in as ${user.role}</p>
                </div>

                <div class="dashboard-grid">
                    <div class="card">
                        <h3>Total Stations</h3>
                        <div class="value" id="statStations">--</div>
                    </div>
                    <div class="card">
                        <h3>Active Trains</h3>
                        <div class="value" id="statTrains">--</div>
                    </div>
                    <div class="card">
                        <h3>Today's Trips</h3>
                        <div class="value" id="statTrips">--</div>
                    </div>
                </div>

                <div class="actions">
                    <h2>Quick Actions</h2>
                    <button class="action-btn" onclick="window.location.href='public/delay-update.html'">
                        ⏱️ Update Train Delay
                    </button>
                    <button class="action-btn" onclick="window.location.href='public/manage-schedules.html'">
                        📅 Manage Schedules
                    </button>
                    <button class="action-btn" onclick="window.location.href='public/manage-stations.html'">
                        🚉 Manage Stations
                    </button>
                    <button class="action-btn" onclick="window.location.href='index.html'">
                        🔍 Go to Passenger Search
                    </button>
                </div>
            `;
        }

        function showUnauthorized() {
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="unauthorized">
                    <h1>🔒 Access Denied</h1>
                    <p>You don't have permission to access this page.</p>
                    <a href="index.html">Go to Home</a> | <a href="login.html">Login as Admin</a>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Delay modal functions
        function openDelayModal() {
            document.getElementById('delayModal').classList.add('active');
            document.getElementById('formMessage').className = 'form-message';
            document.getElementById('formMessage').textContent = '';
        }

        function closeDelayModal() {
            document.getElementById('delayModal').classList.remove('active');
        }

        // Close modal on outside click
        document.getElementById('delayModal').addEventListener('click', (e) => {
            if (e.target.id === 'delayModal') closeDelayModal();
        });

        /**
         * Submit delay update to the staff endpoint
         */
        async function submitDelayUpdate(event) {
            event.preventDefault();
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const scheduleId = document.getElementById('scheduleId').value;
            const delayMinutes = document.getElementById('delayMinutes').value;
            const status = document.getElementById('statusSelect').value;
            const notes = document.getElementById('notes').value;
            const submitBtn = document.getElementById('submitBtn');
            const formMessage = document.getElementById('formMessage');

            // BUG-05: Reject negative delays on the frontend
            if (parseInt(delayMinutes) < 0) {
                formMessage.className = 'form-message error';
                formMessage.textContent = 'Delay minutes cannot be negative.';
                return;
            }

            submitBtn.disabled = true;
            formMessage.className = 'form-message';
            formMessage.textContent = '';

            try {
                const response = await fetch(`${API_BASE_URL}/staff/trains/${scheduleId}/status`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        delay_minutes: parseInt(delayMinutes),
                        status: status,
                        notes: notes
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to update status');
                }

                formMessage.className = 'form-message success';
                formMessage.textContent = 'Train status updated successfully!';

                // Clear form after short delay
                setTimeout(() => {
                    document.getElementById('delayForm').reset();
                    closeDelayModal();
                }, 1500);

            } catch (error) {
                console.error('Update error:', error);
                formMessage.className = 'form-message error';
                formMessage.textContent = error.message || 'Failed to update train status. Please try again.';
            } finally {
                submitBtn.disabled = false;
            }
        }

        // Start
        init();
        
        // Fetch dynamic stats after dashboard loads
        fetchStats();
    </script>
</body>
</html>
